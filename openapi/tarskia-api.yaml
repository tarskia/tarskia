basePath: /
definitions:
  diagram.CheckpointRequest:
    properties:
      expectedBaseRevisionId:
        type: string
      expectedStreamVersion:
        type: integer
      name:
        type: string
      raw:
        type: string
      summaryLines:
        items:
          type: string
        type: array
      valid:
        type: boolean
    type: object
  diagram.CreateStreamRequest:
    properties:
      name:
        type: string
      raw:
        type: string
      valid:
        type: boolean
    type: object
  diagram.RestoreDraftRequest:
    properties:
      expectedStreamVersion:
        type: integer
      revisionId:
        type: string
    type: object
  diagram.SaveDraftRequest:
    properties:
      expectedBaseRevisionId:
        type: string
      expectedStreamVersion:
        type: integer
      name:
        type: string
      raw:
        type: string
      valid:
        type: boolean
    type: object
  dto.DiagramDraftDetailResponse:
    properties:
      baseRevisionId:
        type: string
      name:
        type: string
      raw:
        type: string
      updatedAt:
        type: string
      valid:
        type: boolean
    type: object
  dto.DiagramDraftSummaryResponse:
    properties:
      baseRevisionId:
        type: string
      name:
        type: string
      updatedAt:
        type: string
      valid:
        type: boolean
    type: object
  dto.DiagramRevisionDetailResponse:
    properties:
      checkpointedAt:
        type: string
      id:
        type: string
      name:
        type: string
      parentRevisionId:
        type: string
      raw:
        type: string
      summaryLines:
        items:
          type: string
        type: array
      valid:
        type: boolean
    type: object
  dto.DiagramRevisionSummaryResponse:
    properties:
      checkpointedAt:
        type: string
      id:
        type: string
      name:
        type: string
      parentRevisionId:
        type: string
      summaryLines:
        items:
          type: string
        type: array
      valid:
        type: boolean
    type: object
  dto.DiagramStreamDetailResponse:
    properties:
      createdAt:
        type: string
      draft:
        $ref: '#/definitions/dto.DiagramDraftDetailResponse'
      id:
        type: string
      name:
        type: string
      revisions:
        items:
          $ref: '#/definitions/dto.DiagramRevisionDetailResponse'
        type: array
      scopeKind:
        type: string
      streamVersion:
        type: integer
      updatedAt:
        type: string
    type: object
  dto.DiagramStreamSummaryResponse:
    properties:
      createdAt:
        type: string
      draft:
        $ref: '#/definitions/dto.DiagramDraftSummaryResponse'
      headRevision:
        $ref: '#/definitions/dto.DiagramRevisionSummaryResponse'
      id:
        type: string
      name:
        type: string
      revisionCount:
        type: integer
      scopeKind:
        type: string
      streamVersion:
        type: integer
      updatedAt:
        type: string
    type: object
  dto.GalleryDiagramDetailResponse:
    properties:
      checkpointedAt:
        type: string
      namespace:
        type: string
      raw:
        type: string
      slug:
        type: string
      title:
        type: string
      visibility:
        type: string
    type: object
  dto.GalleryDiagramSourceRepositorySummary:
    properties:
      commit:
        type: string
      committedAt:
        type: string
      ref:
        type: string
      repo:
        type: string
      url:
        type: string
    type: object
  dto.GalleryDiagramSummaryResponse:
    properties:
      namespace:
        type: string
      slug:
        type: string
      sourceRepository:
        $ref: '#/definitions/dto.GalleryDiagramSourceRepositorySummary'
      title:
        type: string
      updatedAt:
        type: string
      workerBuild:
        $ref: '#/definitions/dto.GalleryDiagramWorkerBuildSummary'
    type: object
  dto.GalleryDiagramWorkerBuildSummary:
    properties:
      approxTotalTokens:
        type: integer
      durationMs:
        type: integer
      model:
        type: string
      nodes:
        type: integer
      turns:
        type: integer
    type: object
  dto.MeResponse:
    properties:
      member:
        $ref: '#/definitions/dto.MemberResponse'
      organization:
        $ref: '#/definitions/dto.OrganizationResponse'
    type: object
  dto.MemberResponse:
    properties:
      createdAt:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: string
      lastSeenAt:
        type: string
      organizationId:
        type: string
      principalId:
        type: string
      profilePictureUrl:
        type: string
      updatedAt:
        type: string
    type: object
  dto.OrganizationResponse:
    properties:
      createdAt:
        type: string
      id:
        type: string
      logoUrl:
        type: string
      name:
        type: string
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  dto.SchemaDraftDetailResponse:
    properties:
      baseVersion:
        type: string
      raw:
        type: string
      updatedAt:
        type: string
      valid:
        type: boolean
    type: object
  dto.SchemaDraftSummaryResponse:
    properties:
      baseVersion:
        type: string
      updatedAt:
        type: string
      valid:
        type: boolean
    type: object
  dto.SchemaStreamDetailResponse:
    properties:
      createdAt:
        type: string
      draft:
        $ref: '#/definitions/dto.SchemaDraftDetailResponse'
      name:
        type: string
      streamVersion:
        type: integer
      updatedAt:
        type: string
      versions:
        items:
          $ref: '#/definitions/dto.SchemaVersionDetailResponse'
        type: array
    type: object
  dto.SchemaStreamSummaryResponse:
    properties:
      createdAt:
        type: string
      draft:
        $ref: '#/definitions/dto.SchemaDraftSummaryResponse'
      name:
        type: string
      streamVersion:
        type: integer
      updatedAt:
        type: string
      versions:
        items:
          $ref: '#/definitions/dto.SchemaVersionSummaryResponse'
        type: array
    type: object
  dto.SchemaVersionDetailResponse:
    properties:
      assessment:
        items:
          type: integer
        type: array
      publishedAt:
        type: string
      raw:
        type: string
      version:
        type: string
    type: object
  dto.SchemaVersionSummaryResponse:
    properties:
      assessment:
        items:
          type: integer
        type: array
      publishedAt:
        type: string
      version:
        type: string
    type: object
  schema.CreateSchemaStreamRequest:
    properties:
      baseVersion:
        type: string
      name:
        type: string
      raw:
        type: string
      valid:
        type: boolean
    type: object
  schema.PublishSchemaVersionRequest:
    properties:
      assessment:
        items:
          type: integer
        type: array
      expectedStreamVersion:
        type: integer
      raw:
        type: string
      version:
        type: string
    type: object
  schema.SaveSchemaDraftRequest:
    properties:
      baseVersion:
        type: string
      expectedStreamVersion:
        type: integer
      raw:
        type: string
      valid:
        type: boolean
    type: object
info:
  contact: {}
  description: Thin persistence API for diagram streams, schema streams, and authenticated
    member metadata.
  title: Diagram Backend API
  version: "1.0"
paths:
  /api/gallery:
    get:
      description: Returns the listed diagram gallery catalog
      operationId: listGalleryDiagrams
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.GalleryDiagramSummaryResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List gallery diagrams
      tags:
      - Gallery
  /api/gallery/{namespace}/{slug}:
    get:
      description: Returns a diagram gallery entry by namespace and slug
      operationId: getGalleryDiagram
      parameters:
      - description: Gallery namespace
        in: path
        name: namespace
        required: true
        type: string
      - description: Gallery slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GalleryDiagramDetailResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get gallery diagram
      tags:
      - Gallery
  /diagram-streams:
    get:
      description: Returns all diagram streams owned by the authenticated member
      operationId: listDiagramStreams
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.DiagramStreamSummaryResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List diagram streams
      tags:
      - Diagrams
    post:
      consumes:
      - application/json
      description: Creates a new personal diagram stream with an initial draft
      operationId: createDiagramStream
      parameters:
      - description: Diagram stream payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/diagram.CreateStreamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DiagramStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create diagram stream
      tags:
      - Diagrams
  /diagram-streams/{streamID}:
    get:
      description: Returns a diagram stream, including its current draft and revision
        history
      operationId: getDiagramStream
      parameters:
      - description: Diagram stream ID
        in: path
        name: streamID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DiagramStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get diagram stream
      tags:
      - Diagrams
  /diagram-streams/{streamID}/checkpoints:
    post:
      consumes:
      - application/json
      description: Creates an immutable revision and advances the stream head and
        draft base revision
      operationId: checkpointDiagramStream
      parameters:
      - description: Diagram stream ID
        in: path
        name: streamID
        required: true
        type: string
      - description: Diagram checkpoint payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/diagram.CheckpointRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DiagramStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create diagram checkpoint
      tags:
      - Diagrams
  /diagram-streams/{streamID}/draft:
    put:
      consumes:
      - application/json
      description: Saves the mutable draft for an existing diagram stream
      operationId: saveDiagramDraft
      parameters:
      - description: Diagram stream ID
        in: path
        name: streamID
        required: true
        type: string
      - description: Diagram draft payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/diagram.SaveDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DiagramStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Save diagram draft
      tags:
      - Diagrams
  /diagram-streams/{streamID}/draft/restore:
    post:
      consumes:
      - application/json
      description: Restores the mutable draft from an existing revision
      operationId: restoreDiagramDraft
      parameters:
      - description: Diagram stream ID
        in: path
        name: streamID
        required: true
        type: string
      - description: Revision to restore from
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/diagram.RestoreDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DiagramStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Restore diagram draft
      tags:
      - Diagrams
  /healthz:
    get:
      description: Returns backend and database health status
      operationId: getHealthz
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - Health
  /me:
    get:
      description: Returns the authenticated organization and member metadata for
        the current session
      operationId: getMe
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MeResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current member
      tags:
      - Auth
  /schema-streams:
    get:
      description: Returns all schema streams owned by the authenticated member
      operationId: listSchemaStreams
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SchemaStreamSummaryResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List schema streams
      tags:
      - Schemas
    post:
      consumes:
      - application/json
      description: Creates a new schema stream with an initial draft
      operationId: createSchemaStream
      parameters:
      - description: Schema stream payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/schema.CreateSchemaStreamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SchemaStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create schema stream
      tags:
      - Schemas
  /schema-streams/{name}:
    delete:
      description: Deletes a schema stream and all of its published versions
      operationId: deleteSchemaStream
      parameters:
      - description: Schema stream name
        in: path
        name: name
        required: true
        type: string
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete schema stream
      tags:
      - Schemas
    get:
      description: Returns a schema stream with its current draft and published versions
      operationId: getSchemaStream
      parameters:
      - description: Schema stream name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SchemaStreamDetailResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get schema stream
      tags:
      - Schemas
  /schema-streams/{name}/draft:
    put:
      consumes:
      - application/json
      description: Creates or updates the mutable draft for a schema stream
      operationId: saveSchemaDraft
      parameters:
      - description: Schema stream name
        in: path
        name: name
        required: true
        type: string
      - description: Schema draft payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/schema.SaveSchemaDraftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SchemaStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Save schema draft
      tags:
      - Schemas
  /schema-streams/{name}/versions:
    post:
      consumes:
      - application/json
      description: Creates or replaces a published schema version and clears the current
        draft
      operationId: publishSchemaVersion
      parameters:
      - description: Schema stream name
        in: path
        name: name
        required: true
        type: string
      - description: Schema version payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/schema.PublishSchemaVersionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SchemaStreamDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Publish schema version
      tags:
      - Schemas
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
