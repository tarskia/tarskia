owner: gallery
name: supabase
version: "0.1"
description: >-
  Supabase-shaped architectural wrappers for the browser surfaces, Studio control plane,
  edge-function runtime, self-hosted Docker stack, and shared package modules.
use:
  - schema: core/code@0.1
    alias: code
  - schema: core/frontend@0.3
    alias: fe
  - schema: core/software@0.1
    alias: sw
  - schema: core/web-app@0.3
    alias: app
types:
  - id: supabase
    label: Supabase
    description: >-
      Top-level Supabase application boundary spanning browser surfaces, the Studio control plane,
      edge functions, the self-hosted stack, and shared package modules.
    extends: core/software.types.system
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.service
    containment:
      allowedChildTypes:
        - frontend
        - control-plane
        - edge-functions
        - self-hosted-stack
        - module
        - group
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 340
        height: 200
      style:
        hue: 210
      count:
        childTypes:
          - frontend
          - control-plane
          - edge-functions
          - self-hosted-stack
          - module
          - group
        label: components
  - id: control-plane
    label: Control Plane
    description: >-
      Studio dashboard and metadata/API runtime for the operator-facing web app and the shared
      metadata packages that back it.
    extends: core/web-app.types.application
    traits:
      - core/software.traits.service-like
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.service
    containment:
      allowedChildTypes:
        - api
        - service
        - module
        - group
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 260
        height: 140
      style:
        hue: 222
      count:
        childTypes:
          - api
          - service
          - module
          - group
        label: components
  - id: edge-functions
    label: Edge Functions
    description: >-
      Deno-hosted edge-function surface for request-time automation such as OG image generation and
      embedding search.
    extends: core/web-app.types.service
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.service
    containment:
      allowedChildTypes:
        - api
        - module
        - group
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 230
        height: 110
      style:
        hue: 194
      count:
        childTypes:
          - api
          - module
          - group
        label: functions
  - id: self-hosted-stack
    label: Self-Hosted Stack
    description: >-
      Docker Compose runtime for the self-hosted Supabase deployment, including Studio, Kong, Auth,
      PostgREST, Realtime, Storage, Postgres, and supporting services.
    extends: core/software.types.system
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.deployment
    containment:
      allowedChildTypes:
        - service
        - datastore
        - object-store
        - queue
        - module
        - group
    display:
      primaryTag: core/software.tags.deployment
      defaultSize:
        width: 300
        height: 170
      style:
        hue: 165
      count:
        childTypes:
          - service
          - datastore
          - object-store
          - queue
          - module
          - group
        label: components
relations: []
