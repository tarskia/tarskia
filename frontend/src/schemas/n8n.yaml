owner: gallery
name: n8n
version: "0.1"
description: >-
  n8n-shaped architectural wrappers for the browser editor, main server/control plane, queue worker
  runtime, task runner processes, and local gateway, aligned to the repository's deployable runtime
  surfaces rather than internal code packages.
use:
  - schema: core/base@0.1
    alias: base
  - schema: core/software@0.1
    alias: sw
  - schema: core/frontend@0.3
    alias: fe
  - schema: core/code@0.1
    alias: code
  - schema: core/web-app@0.3
    alias: web
traits:
  - id: n8n-runtime-like
    label: n8n Runtime
    description: >-
      Top-level n8n application boundary spanning browser, server, worker, task-runner, and
      local-gateway flows.
    extends: core/base.traits.containable
    analysis:
      flowType: through
      expectedRelationIds:
        - calls
        - publishes-to
        - consumes-from
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: both
      - relation: core/software.relations.publishes-to
        endpoint: from
      - relation: core/software.relations.consumes-from
        endpoint: from
  - id: portal-boundary-like
    label: Portal Boundary
    description: Browser-facing editor surface that originates user-driven flow into the repo-owned runtime.
    extends: core/base.traits.containable
    analysis:
      flowType: source
      expectedRelationIds:
        - calls
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: from
  - id: control-plane-like
    label: Control Plane
    description: >-
      Main Node/Express runtime that serves the app shell, API, webhooks, auth, and orchestration
      flows.
    extends: core/base.traits.containable
    analysis:
      flowType: through
      expectedRelationIds:
        - calls
        - publishes-to
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: both
      - relation: core/software.relations.publishes-to
        endpoint: from
  - id: worker-service-like
    label: Worker Service
    description: Queue-processing runtime for workflow execution, retries, and asynchronous maintenance work.
    extends: core/base.traits.containable
    analysis:
      flowType: through
      expectedRelationIds:
        - calls
        - publishes-to
        - consumes-from
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: both
      - relation: core/software.relations.publishes-to
        endpoint: from
      - relation: core/software.relations.consumes-from
        endpoint: from
  - id: task-runner-like
    label: Task Runner
    description: >-
      External runtime that executes delegated workflow code and can call back into the control
      plane or out to external integrations.
    extends: core/base.traits.containable
    analysis:
      flowType: through
      expectedRelationIds:
        - calls
        - consumes-from
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: both
      - relation: core/software.relations.consumes-from
        endpoint: from
  - id: local-gateway-like
    label: Local Gateway
    description: >-
      Desktop tray runtime that exposes a secure local HTTP gateway and continues into the
      computer-use daemon and renderer flows.
    extends: core/base.traits.containable
    analysis:
      flowType: through
      expectedRelationIds:
        - calls
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: both
types:
  - id: n8n
    label: n8n
    description: >-
      Top-level n8n application boundary spanning browser editor, main server/control plane, queue
      worker runtime, task runner processes, and local gateway.
    extends: core/web-app.types.application
    traits:
      - gallery/n8n.traits.n8n-runtime-like
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.service
    containment:
      allowedChildTypes:
        - portal-app
        - control-plane
        - worker-service
        - task-runner
        - local-gateway
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 380
        height: 208
      style:
        hue: 210
      count:
        childTypes:
          - portal-app
          - control-plane
          - worker-service
          - task-runner
          - local-gateway
        label: components
  - id: portal-app
    label: Portal App
    description: Browser-facing n8n editor UI and related client surfaces.
    extends: core/frontend.types.frontend
    traits:
      - gallery/n8n.traits.portal-boundary-like
    analysis:
      topLevelBias: prefer
    defaultTags:
      - core/software.tags.service
    containment:
      allowedChildTypes:
        - module
        - group
      allowedChildTraits:
        - core/code.traits.code-like
        - core/base.traits.group-like
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 228
        height: 108
      style:
        hue: 188
      count:
        childTypes:
          - module
          - group
        label: components
    properties:
      - id: runtime
        type: enum
        description: >-
          Primary execution environment for this node or subtree. Populate it when one runtime is
          uniformly true for the boundary. If major children would have different runtimes, prefer
          separate boundaries instead of mixing them under one node.
        values:
          - browser
          - server
          - worker
          - edge
          - cli
          - external
        allowOther: true
      - id: framework
        type: enum
        description: >-
          Dominant framework or runtime stack for this node or subtree when one choice is uniformly
          true. Prefer it on the highest boundary where it stays accurate instead of repeating it
          across every descendant.
        values:
          - react
          - nextjs
          - vue
          - svelte
          - express
          - fastify
          - koa
          - nestjs
          - socketio
        allowOther: true
  - id: control-plane
    label: Control Plane
    description: Main Node runtime that serves the editor shell, API, webhooks, auth, and orchestration flows.
    extends: core/web-app.types.service
