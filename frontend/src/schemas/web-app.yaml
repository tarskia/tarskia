owner: core
name: web-app
version: "0.3"
description: Deployable application architecture primitives. Use these types for runtime systems, interfaces, storage, and infrastructure boundaries rather than internal code structure.
use:
  - schema: core/software@0.1
    alias: sw

traits: []

types:
  - id: application
    label: Application
    description: User-facing or operator-facing software system composed of deployable services, APIs, and groups.
    traits: [core/software.traits.compute, core/base.traits.container]
    defaultTags: [core/software.tags.service]
    containment:
      allowedChildTraits:
        [core/software.traits.api-like, core/software.traits.service-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 180
        height: 80
      style:
        hue: 210
      count:
        childTypes: [api, service, group]
        label: components
    properties:
      - id: runtime
        type: enum
        description: Primary execution environment for this node or subtree. Populate it when one runtime is uniformly true for the boundary. If major children would have different runtimes, prefer separate boundaries instead of mixing them under one node.
        values: [browser, server, worker, edge, cli, external]
        allowOther: true
        display:
          priority: 1
      - id: framework
        type: enum
        description: Dominant framework or runtime stack for this node or subtree when one choice is uniformly true. Prefer it on the highest boundary where it stays accurate instead of repeating it across every descendant.
        values: [react, nextjs, vue, svelte, express, fastify, koa, nestjs, socketio]
        allowOther: true
        display:
          priority: 2

  - id: api
    label: API
    description: Interface surface exposed by an application or service. Use this for an externally meaningful API boundary, not an internal code package.
    traits:
      [core/software.traits.api-like, core/software.traits.interface, core/base.traits.container]
    defaultTags: [core/software.tags.service]
    containment:
      allowedChildTraits: [core/software.traits.endpoint-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 200
        height: 90
      style:
        hue: 220
      count:
        childTypes: [api-endpoint, group]
        label: components
    properties:
      - id: runtime
        type: enum
        description: Primary execution environment for this node or subtree. Populate it when one runtime is uniformly true for the boundary. If major children would have different runtimes, prefer separate boundaries instead of mixing them under one node.
        values: [browser, server, worker, edge, cli, external]
        allowOther: true
        display:
          priority: 1
      - id: framework
        type: enum
        description: Dominant framework or runtime stack for this node or subtree when one choice is uniformly true. Prefer it on the highest boundary where it stays accurate instead of repeating it across every descendant.
        values: [react, nextjs, vue, svelte, express, fastify, koa, nestjs, socketio]
        allowOther: true
        display:
          priority: 2

  - id: api-endpoint
    label: Endpoint
    description: Single callable operation within an API surface, such as an HTTP endpoint or RPC method.
    traits: [core/software.traits.endpoint-like, core/base.traits.container]
    defaultTags: [core/software.tags.service]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 190
        height: 90
      style:
        hue: 225
    properties:
      - id: http
        type: object
        description: HTTP surface details for this endpoint when they are architecturally meaningful.
        properties:
          - id: method
            type: enum
            description: HTTP method exposed by the endpoint.
            values: [GET, POST, PUT, PATCH, DELETE]
          - id: path
            type: string
            description: Route path or path template served by the endpoint.
          - id: auth
            type: enum
            description: Authentication expectation for callers of the endpoint.
            values: [public, auth, admin]
        display:
          template: "{method} {path}"

  - id: group
    label: Group
    description: Organizational container for related architecture elements when you need grouping without introducing a new deployable runtime.
    traits: [core/base.traits.group-like, core/base.traits.container, core/software.traits.compute]
    analysis:
      topLevelBias: avoid
    containment:
      allowedChildTraits:
        [
          core/base.traits.containable,
          core/software.traits.compute,
          core/software.traits.storage-boundary,
          core/software.traits.storage,
          core/software.traits.queueing,
        ]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 190
        height: 90
      style:
        hue: 200
    properties:
      - id: mode
        type: enum
        description: Whether the group contains one uniform child type or a deliberately mixed set.
        values: [typed, mixed]
      - id: groupType
        type: string
        description: Exact ontology type id shared by every child when mode is typed.
      - id: runtime
        type: enum
        description: Primary execution environment for this node or subtree. Populate it when one runtime is uniformly true for the boundary. If major children would have different runtimes, prefer separate boundaries instead of mixing them under one node.
        values: [browser, server, worker, edge, cli, external]
        allowOther: true
        display:
          priority: 1
      - id: framework
        type: enum
        description: Dominant framework or runtime stack for this node or subtree when one choice is uniformly true. Prefer it on the highest boundary where it stays accurate instead of repeating it across every descendant.
        values: [react, nextjs, vue, svelte, express, fastify, koa, nestjs, socketio]
        allowOther: true
        display:
          priority: 2

  - id: service
    label: Service
    description: Deployable runtime boundary, such as a microservice or cohesive service slice. Use code/module for internal implementation units that are not independently deployable.
    traits:
      [core/software.traits.service-like, core/software.traits.compute, core/base.traits.container]
    defaultTags: [core/software.tags.service]
    containment:
      allowedChildTraits:
        [core/software.traits.api-like, core/software.traits.service-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 180
        height: 80
      style:
        hue: 28
      count:
        childTypes: [api, service, group]
        label: components
    properties:
      - id: deployability
        type: enum
        description: Whether this service is independently deployable or embedded inside another runtime.
        values: [embedded, deployable]
      - id: runtime
        type: enum
        description: Primary execution environment for this node or subtree. Populate it when one runtime is uniformly true for the boundary. If major children would have different runtimes, prefer separate boundaries instead of mixing them under one node.
        values: [browser, server, worker, edge, cli, external]
        allowOther: true
        display:
          priority: 1
      - id: framework
        type: enum
        description: Dominant framework or runtime stack for this node or subtree when one choice is uniformly true. Prefer it on the highest boundary where it stays accurate instead of repeating it across every descendant.
        values: [react, nextjs, vue, svelte, express, fastify, koa, nestjs, socketio]
        allowOther: true
        display:
          priority: 2

  - id: datastore
    label: Datastore
    description: Storage boundary or storage plane for persisted state, caches, object storage, or file storage. When zooming into a broader storage boundary, prefer child storage types for distinct backends or sinks instead of modeling them as code modules.
    traits:
      [
        core/software.traits.storage,
        core/base.traits.countable,
        core/base.traits.container,
      ]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits:
        [
          core/software.traits.storage-boundary,
          core/software.traits.storage,
          core/software.traits.table-like,
          core/base.traits.group-like,
        ]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 230
        height: 140
      style:
        hue: 170
      count:
        childTypes: [datastore, relational-db, object-store, cache, cache-space, group]
        label: components

  - id: relational-db
    label: Relational DB
    description: Concrete relational database sink inside a storage plane or as a standalone datastore. Prefer this over a code module when the node is primarily a database runtime rather than executable business logic.
    traits:
      [
        core/software.traits.relational-storage,
        core/base.traits.countable,
        core/base.traits.container,
      ]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits: [core/software.traits.table-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 230
        height: 140
      style:
        hue: 170
      count:
        childTypes: [group]
        label: components
    properties:
      - id: implementation
        type: enum
        description: Primary database engine or product used for this relational store.
        values: [postgres, mysql, sqlserver]
        allowOther: true
        display:
          priority: 1
      - id: hosting
        type: object
        description: Hosting details for the relational store when deployment context matters.
        properties:
          - id: provider
            type: enum
            description: Infrastructure provider or operating environment for the store.
            values: [aws, on-prem]
          - id: service
            type: enum
            description: Managed service or hosting mode used for the store.
            values: [rds, self-hosted]
          - id: location
            type: string
            description: Region, cluster, or physical location for the store when known.
        display:
          template: "{provider} {service} · {location}"
          priority: 2

  - id: object-store
    label: Object Store
    description: Concrete object or blob storage sink inside a storage plane or as a standalone datastore. Prefer this over a code module when the node is primarily a bucketed storage runtime such as S3, GCS, Azure Blob Storage, or MinIO rather than executable business logic.
    traits:
      [
        core/software.traits.storage,
        core/base.traits.countable,
        core/base.traits.container,
      ]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits: [core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 220
        height: 120
      style:
        hue: 162
      count:
        childTypes: [group]
        label: components
    properties:
      - id: implementation
        type: enum
        description: Primary object storage product or API used for this store.
        values: [s3, gcs, azure-blob, minio]
        allowOther: true
        display:
          priority: 1
      - id: hosting
        type: object
        description: Hosting details for the object store when deployment context matters.
        properties:
          - id: provider
            type: enum
            description: Infrastructure provider or operating environment for the store.
            values: [aws, gcp, azure, on-prem]
          - id: service
            type: enum
            description: Managed service or hosting mode used for the object store.
            values: [managed, self-hosted]
          - id: location
            type: string
            description: Region, cluster, or physical location for the store when known.
        display:
          template: "{provider} {service} · {location}"
          priority: 2

  - id: queue
    label: Queue
    traits: [core/software.traits.queueing, core/base.traits.container]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits: [core/software.traits.topic-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 210
        height: 100
      style:
        hue: 35
      count:
        childTypes: [topic, group]
        label: topics

  - id: topic
    label: Topic
    description: Flow-through message topic or channel inside a queue or event bus. Model producers publishing to it and consumers or subscriptions consuming from it; avoid using a topic as the start or end of data flow unless the opposite side is intentionally outside the current scope.
    traits:
      [core/software.traits.topic-like, core/software.traits.queueing, core/base.traits.container]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits: [core/software.traits.subscription-like]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 180
        height: 86
      style:
        hue: 28
      count:
        childTypes: [subscription]
        label: subscriptions
    properties:
      - id: retentionHours
        type: number
        description: Approximate message retention window for the topic in hours.
        display:
          priority: 1
      - id: partitions
        type: number
        description: Partition or shard count for the topic when the messaging runtime exposes it.
        display:
          priority: 2

  - id: subscription
    label: Subscription
    traits: [core/software.traits.subscription-like, core/software.traits.compute]
    defaultTags: [core/software.tags.data]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 180
        height: 72
      style:
        hue: 30
    properties:
      - id: delivery
        type: enum
        description: Whether subscribers are pushed to or pull from the topic.
        values: [push, pull]
        display:
          priority: 1

  - id: cache
    label: Cache
    description: Cache runtime or logical caching boundary used as a storage sink. Prefer this over code modules when the node is mainly a cache backend rather than compute logic.
    traits: [core/software.traits.storage, core/base.traits.container]
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits: [core/software.traits.cache-space-like, core/base.traits.group-like]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 210
        height: 90
      style:
        hue: 45
      count:
        childTypes: [cache-space, group]
        label: spaces

  - id: cache-space
    label: Cache Space
    description: Named cache partition, namespace, or logical key space inside a cache boundary.
    traits: [core/software.traits.cache-space-like, core/software.traits.storage]
    defaultTags: [core/software.tags.data]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 170
        height: 72
      style:
        hue: 52
    properties:
      - id: ttlSeconds
        type: number
        description: Default time-to-live for entries in this cache space.
        display:
          priority: 1
      - id: eviction
        type: enum
        description: Dominant eviction strategy used when entries expire or capacity is reached.
        values: [lru, lfu, ttl]
        display:
          priority: 2

  - id: scheduler
    label: Scheduler
    traits:
      [core/software.traits.scheduler-like, core/software.traits.compute, core/base.traits.container]
    defaultTags: [core/software.tags.service]
    containment:
      allowedChildTraits: [core/software.traits.job-like]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 210
        height: 96
      style:
        hue: 18
      count:
        childTypes: [scheduled-job]
        label: jobs

  - id: scheduled-job
    label: Scheduled Job
    traits: [core/software.traits.job-like, core/software.traits.compute]
    defaultTags: [core/software.tags.service]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 190
        height: 78
      style:
        hue: 15
    properties:
      - id: schedule
        type: string
        description: Cron-like or human-readable schedule for the job when known.
        display:
          priority: 1
      - id: retries
        type: number
        description: Nominal retry count or retry budget for the job.

  - id: external-api
    label: External API
    description: >-
      External integration boundary for APIs, SaaS products, cloud provider services, partner
      systems, or dynamic user/plugin-selected outbound services outside the repository. Use a
      concrete provider when evidence names one; otherwise use a generic node such as External
      Services or External Integrations to terminate visible flow at the system boundary. Prefer
      this over inventing an internal queue, broker, or runtime solely to continue a flow.
    traits: [core/software.traits.compute, core/software.traits.interface]
    defaultTags: [core/software.tags.integration]
    display:
      primaryTag: core/software.tags.integration
      defaultSize:
        width: 170
        height: 70
      style:
        hue: 300
    properties:
      - id: specificity
        type: enum
        description: How precisely the external target is known from the available evidence.
        values: [named-provider, provider-family, dynamic, unknown]
        display:
          priority: 1
      - id: category
        type: enum
        description: Functional class of the external integration.
        values:
          [
            third-party-api,
            external-service,
            saas,
            cloud-provider,
            payment,
            messaging,
            storage,
            observability,
            identity,
            ai,
            webhook-target,
          ]
        allowOther: true
        display:
          priority: 2
      - id: protocol
        type: enum
        description: Primary protocol or integration surface when known.
        values: [http, rest, graphql, grpc, webhook, sdk, websocket, smtp, amqp]
        allowOther: true
      - id: direction
        type: enum
        description: Direction of interaction relative to the repo-owned system.
        values: [inbound, outbound, bidirectional]
      - id: provider
        type: string
        description: Named provider, product, or integration family when known.

relations: []
