owner: gallery
name: clickhouse
version: "0.1"
description: ClickHouse-shaped architectural wrappers for modeling the database engine with native-looking runtime boundaries while staying on top of the shared core schemas.
use:
  - schema: core/software@0.1
    alias: sw
  - schema: core/web-app@0.3
    alias: web

traits:
  - id: protocol-surface-like
    label: Protocol Surface
    extends: core/base.traits.containable
    analysis:
      flowType: through
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: from
      - relation: core/software.relations.calls
        endpoint: to

  - id: runtime-stack-like
    label: Runtime Stack
    extends: core/base.traits.containable
    analysis:
      flowType: through
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: from
      - relation: core/software.relations.calls
        endpoint: to

  - id: tooling-like
    label: Tooling
    extends: core/base.traits.containable
    analysis:
      flowType: source
      mayTerminate: true
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: from

  - id: coordination-like
    label: Coordination
    extends: core/base.traits.containable
    analysis:
      flowType: sink
      mayTerminate: true
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: to

  - id: storage-stack-like
    label: Storage Stack
    extends: core/base.traits.containable
    analysis:
      flowType: sink
      mayTerminate: true
    relationParticipation:
      - relation: core/software.relations.calls
        endpoint: to
      - relation: core/software.relations.reads
        endpoint: to
      - relation: core/software.relations.writes
        endpoint: to
      - relation: core/software.relations.read-writes
        endpoint: to

types:
  - id: engine
    label: Engine
    description: Top-level ClickHouse product/runtime boundary. Use this for the overall database engine when application or service is too narrow.
    extends: core/software.types.system
    defaultTags: [core/software.tags.service]
    display:
      primaryTag: core/software.tags.service
      style:
        hue: 206

  - id: runtime-stack
    label: Runtime Stack
    description: Named wrapper for a major active area such as server runtime, query runtime, or background maintenance.
    traits: [gallery/clickhouse.traits.runtime-stack-like, core/base.traits.container]
    analysis:
      topLevelBias: prefer
    defaultTags: [core/software.tags.service]
    containment:
      allowedChildTraits:
        [
          core/base.traits.containable,
          core/software.traits.compute,
          core/software.traits.storage-boundary,
          core/software.traits.storage,
        ]
    display:
      primaryTag: core/software.tags.service
      defaultSize:
        width: 200
        height: 96
      style:
        hue: 198

  - id: protocol-surface
    label: Protocol Surface
    description: Externally meaningful access surface such as HTTP, native TCP, interserver, MySQL, PostgreSQL, or ArrowFlight.
    extends: core/web-app.types.api
    traits: [gallery/clickhouse.traits.protocol-surface-like]
    analysis:
      topLevelBias: neutral
    display:
      style:
        hue: 218

  - id: storage-stack
    label: Storage Stack
    description: Persistence-facing boundary for storage engines, disks, metadata catalog, dictionaries, and related subsystems.
    traits: [gallery/clickhouse.traits.storage-stack-like, core/base.traits.container]
    analysis:
      topLevelBias: prefer
    defaultTags: [core/software.tags.data]
    containment:
      allowedChildTraits:
        [
          core/base.traits.containable,
          core/software.traits.storage-boundary,
          core/software.traits.storage,
          core/software.traits.compute,
        ]
    display:
      primaryTag: core/software.tags.data
      defaultSize:
        width: 210
        height: 110
      style:
        hue: 165

  - id: coordination-service
    label: Coordination Service
    description: Coordination boundary such as ClickHouse Keeper and related coordination runtime.
    traits: [gallery/clickhouse.traits.coordination-like, core/base.traits.container]
    analysis:
      topLevelBias: prefer
    defaultTags: [core/software.tags.integration]
    containment:
      allowedChildTraits:
        [
          core/base.traits.containable,
          core/software.traits.compute,
          core/software.traits.storage-boundary,
          core/software.traits.storage,
        ]
    display:
      primaryTag: core/software.tags.integration
      defaultSize:
        width: 190
        height: 84
      style:
        hue: 24

  - id: tool-suite
    label: Tool Suite
    description: Wrapper for shipped clients and local operational tools such as clickhouse-client, local mode, benchmark, compressor, and disk utilities.
    traits: [gallery/clickhouse.traits.tooling-like, core/base.traits.container]
    analysis:
      topLevelBias: neutral
    defaultTags: [core/software.tags.integration]
    containment:
      allowedChildTraits: [core/base.traits.containable, core/software.traits.compute]
    display:
      primaryTag: core/software.tags.integration
      defaultSize:
        width: 190
        height: 84
      style:
        hue: 42

relations: []
