        name: Portal Entry Router
        description: Portal app shell and route config.
        props:
          mode: mixed
        provenance:
          locations:
            - input: primary
              path: src/portal/src/main.ts
            - input: primary
              path: src/portal/src/app/app.module.ts
            - input: primary
              path: src/portal/src/app/harbor-routing.module.ts
        children:
          - id: harbor-browser-portal/portal-entry-router/portal-app-shell
            type: core/frontend.types.frontend
            name: Portal App Shell
            description: Browser app shell.
            props:
              framework: angular
              runtime: browser
            provenance:
              locations:
