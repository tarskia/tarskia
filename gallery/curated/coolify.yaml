version: 0.1.0
schemaRefs:
  - schema: gallery/coolify@0.1
    layer: 0
  - schema: core/frontend@0.3
    layer: 0
  - schema: core/web-app@0.3
    layer: 0
  - schema: core/software@0.1
    layer: 0
  - schema: core/base@0.1
    layer: 0
  - schema: core/code@0.1
    layer: 1
entities:
  - id: portal-app
    type: gallery/coolify.types.portal-app
    name: Portal App
    description: Browser-facing Livewire portal for operator workflows.
    provenance:
      locations:
        - input: primary
          path: routes/web.php
        - input: primary
          path: public/index.php
        - input: primary
          path: public/js/echo.js
    children:
      - id: portal-app/web-routes
        type: core/code.types.module
        name: Web Routes
        description: Browser bootstrap and route surface.
        provenance:
          locations:
            - input: primary
              path: routes/web.php
            - input: primary
              path: public/index.php
        children:
          - id: portal-app/web-routes/browser-bootstrap
            type: core/web-app.types.group
            name: Browser Bootstrap
            description: Bootstrap runtime and front controller.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: public/index.php
            children:
              - id: portal-app/web-routes/browser-bootstrap/php-runtime
                type: core/software.types.system
                name: PHP Runtime
                description: Request execution boundary.
                provenance:
                  locations:
                    - input: primary
                      path: public/index.php
              - id: portal-app/web-routes/browser-bootstrap/entrypoint
                type: core/code.types.module
                name: Front Controller
                description: Browser request bootstrap.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: public/index.php
          - id: portal-app/web-routes/route-definitions
            type: core/code.types.module
            name: Route Definitions
            description: Authenticated browser route surface.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: routes/web.php
            children:
              - id: portal-app/web-routes/route-definitions/authenticated-browser-routes
                type: core/code.types.module
                name: Authenticated Browser Routes
                description: Dashboard and terminal route surface.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: routes/web.php
      - id: portal-app/realtime-client
        type: core/code.types.module
        name: Realtime Bridge
        description: Browser realtime client.
        provenance:
          locations:
            - input: primary
              path: public/js/echo.js
  - id: control-plane-core
    type: gallery/coolify.types.control-plane
    name: Control Plane
    description: >-
      Main Laravel runtime that serves the operator UI, REST API, provisioning templates,
      authentication, webhook handling, and orchestration workflows.
    provenance:
      locations:
        - input: primary
          path: routes/api.php
        - input: primary
          path: app/Http/Controllers/Api/DeployController.php
        - input: primary
          path: app/Console/Kernel.php
    children:
      - id: control-plane-core/api-surface
        type: core/code.types.module
        name: API Surface
        description: Authenticated API routes and contract documentation.
        props:
          language: php
          runtime: server
        provenance:
          locations:
            - input: primary
              path: routes/api.php
            - input: primary
              path: openapi.yaml
            - input: primary
              path: openapi.json
        children:
          - id: control-plane-core/api-surface/route-dispatch
            type: core/code.types.module
            name: Route Dispatch
            description: Authenticated API route surface.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: routes/api.php
          - id: control-plane-core/api-surface/api-contract
            type: core/code.types.module
            name: API Contract Docs
            description: Machine-readable contract docs.
            provenance:
              locations:
                - input: primary
                  path: openapi.yaml
                - input: primary
                  path: openapi.json
      - id: control-plane-core/deploy-controller
        type: core/code.types.module
        name: Deploy Controller
        description: Deployment lifecycle and provider bridge.
        props:
          language: php
          runtime: server
        provenance:
          locations:
            - input: primary
              path: app/Http/Controllers/Api/DeployController.php
        children:
          - id: control-plane-core/deploy-controller/deployment-lifecycle
            type: core/code.types.module
            name: Deployment Lifecycle
            description: Request entry, lifecycle actions, state access, and provider handoff.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: app/Http/Controllers/Api/DeployController.php
            children:
              - id: control-plane-core/deploy-controller/deployment-lifecycle/controller-entry
                type: core/code.types.module
                name: Controller Entry
                description: HTTP request entrypoint.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: app/Http/Controllers/Api/DeployController.php
              - id: control-plane-core/deploy-controller/deployment-lifecycle/request-dispatch
                type: core/code.types.module
                name: Request Dispatch
                description: Controller entrypoint.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: app/Http/Controllers/Api/DeployController.php
              - id: control-plane-core/deploy-controller/deployment-lifecycle/lifecycle-actions
                type: core/code.types.module
                name: Lifecycle Actions
                description: Lifecycle action coordination.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: app/Http/Controllers/Api/DeployController.php
                children:
                  - id: >-
                      control-plane-core/deploy-controller/deployment-lifecycle/lifecycle-actions/action-execution
                    type: core/code.types.module
                    name: Action Execution
                    description: Lifecycle branch coordinator.
                    provenance:
                      locations:
                        - input: primary
                          path: app/Http/Controllers/Api/DeployController.php
              - id: control-plane-core/deploy-controller/deployment-lifecycle/state-access
                type: core/code.types.module
                name: State Access
                description: Persistence read/write layer.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: app/Http/Controllers/Api/DeployController.php
              - id: control-plane-core/deploy-controller/deployment-lifecycle/provider-handoff
                type: core/code.types.module
                name: Provider Handoff
                description: Provider-specific orchestration bridge.
                props:
                  language: php
                  runtime: server
                provenance:
                  locations:
                    - input: primary
                      path: app/Http/Controllers/Api/DeployController.php
          - id: control-plane-core/deploy-controller/provider-adapter
            type: core/code.types.module
            name: Provider Adapter
            description: Outbound provider integration bridge.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: app/Http/Controllers/Api/DeployController.php
      - id: control-plane-core/console-kernel
        type: core/code.types.module
        name: Console Kernel
        description: Scheduler wiring module.
        props:
          language: php
          runtime: server
        provenance:
          locations:
            - input: primary
              path: app/Console/Kernel.php
  - id: scheduler-queue-plane
    type: gallery/coolify.types.worker-service
    name: Scheduler and Queue Plane
    description: Queue-processing and scheduled-task runtime for maintenance jobs and background orchestration.
    provenance:
      locations:
        - input: primary
          path: app/Console/Kernel.php
        - input: primary
          path: app/Jobs/ApplicationDeploymentJob.php
        - input: primary
          path: app/Jobs/ScheduledJobManager.php
        - input: primary
          path: app/Console/Commands/CleanupRedis.php
    children:
      - id: scheduler-queue-plane/queue-runtime
        type: core/web-app.types.scheduler
        name: Queue Runtime
        description: Scheduler coordination, queued deployment work, and Redis maintenance.
        provenance:
          locations:
            - input: primary
              path: app/Console/Kernel.php
            - input: primary
              path: app/Jobs/ApplicationDeploymentJob.php
            - input: primary
              path: app/Jobs/ScheduledJobManager.php
            - input: primary
              path: app/Console/Commands/CleanupRedis.php
        children:
          - id: scheduler-queue-plane/queue-runtime/scheduled-job-manager
            type: core/code.types.module
            name: Scheduled Job Manager
            description: Scheduled job registration and dispatch.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: app/Console/Kernel.php
                - input: primary
                  path: app/Jobs/ScheduledJobManager.php
            children:
              - id: scheduler-queue-plane/queue-runtime/scheduled-job-manager/schedule-registration
                type: core/code.types.module
                name: Schedule Registration
                description: Kernel scheduling setup.
                provenance:
                  locations:
                    - input: primary
                      path: app/Console/Kernel.php
              - id: scheduler-queue-plane/queue-runtime/scheduled-job-manager/request-dispatch
                type: core/code.types.module
                name: Job Dispatch
                description: Scheduled job coordinator.
                provenance:
                  locations:
                    - input: primary
                      path: app/Jobs/ScheduledJobManager.php
          - id: scheduler-queue-plane/queue-runtime/application-deployment-job
            type: core/web-app.types.scheduled-job
            name: Application Deployment Job
            description: Queued deployment work.
            provenance:
              locations:
                - input: primary
                  path: app/Jobs/ApplicationDeploymentJob.php
          - id: scheduler-queue-plane/queue-runtime/cleanup-redis
            type: core/code.types.module
            name: Cleanup Redis
            description: Redis maintenance command.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: app/Console/Commands/CleanupRedis.php
  - id: realtime-service
    type: gallery/coolify.types.realtime-service
    name: Realtime Service
    description: Separate Node/Soketi runtime for browser terminal sessions and realtime broadcasts.
    provenance:
      locations:
        - input: primary
          path: docker-compose.prod.yml
        - input: primary
          path: routes/channels.php
        - input: primary
          path: public/js/pusher.js
        - input: primary
          path: app/Jobs/PushServerUpdateJob.php
    children:
      - id: realtime-service/realtime-stack
        type: core/code.types.module
        name: Realtime Stack
        description: Realtime transport, broadcast bridge, and server update job.
        props:
          language: javascript
          runtime: server
        provenance:
          locations:
            - input: primary
              path: docker-compose.prod.yml
            - input: primary
              path: routes/channels.php
            - input: primary
              path: public/js/pusher.js
            - input: primary
              path: app/Jobs/PushServerUpdateJob.php
        children:
          - id: realtime-service/realtime-stack/broadcast-bridge
            type: core/code.types.module
            name: Broadcast Bridge
            description: Realtime client bridge and channel authorization.
            provenance:
              locations:
                - input: primary
                  path: public/js/pusher.js
                - input: primary
                  path: routes/channels.php
            children:
              - id: realtime-service/realtime-stack/broadcast-bridge/client-realtime
                type: core/code.types.module
                name: Realtime Client
                description: Browser-side transport bridge.
                provenance:
                  locations:
                    - input: primary
                      path: public/js/pusher.js
              - id: realtime-service/realtime-stack/broadcast-bridge/channel-authorization
                type: core/code.types.module
                name: Channel Authorization
                description: Broadcast channel guard.
                provenance:
                  locations:
                    - input: primary
                      path: routes/channels.php
          - id: realtime-service/realtime-stack/soketi-service
            type: core/code.types.module
            name: Soketi Service
            description: Realtime transport service.
            provenance:
              locations:
                - input: primary
                  path: docker-compose.prod.yml
          - id: realtime-service/realtime-stack/server-update-job
            type: core/code.types.module
            name: Server Update Job
            description: Pushes platform updates.
            props:
              language: php
              runtime: server
            provenance:
              locations:
                - input: primary
                  path: app/Jobs/PushServerUpdateJob.php
  - id: persistence-plane
    type: core/web-app.types.datastore
    name: Persistence Plane
    description: Postgres and Redis state plane for domain data, queueing, and coordination.
    provenance:
      locations:
        - input: primary
          path: database/migrations/2014_10_12_000000_create_users_table.php
        - input: primary
          path: database/migrations/2023_03_20_112811_create_teams_table.php
        - input: primary
          path: docker-compose.prod.yml
    children:
      - id: persistence-plane/primary-database
        type: core/web-app.types.relational-db
        name: Primary Database
        description: Postgres relational store.
        props:
          implementation: postgres
        provenance:
          locations:
            - input: primary
              path: database/migrations/2014_10_12_000000_create_users_table.php
            - input: primary
              path: database/migrations/2023_03_20_112811_create_teams_table.php
            - input: primary
              path: docker-compose.prod.yml
      - id: persistence-plane/redis-cache
        type: core/web-app.types.cache
        name: Redis Cache
        description: Redis-backed cache and queue state.
        provenance:
          locations:
            - input: primary
              path: docker-compose.prod.yml
            - input: primary
              path: app/Console/Commands/CleanupRedis.php
  - id: external-integrations
    type: core/web-app.types.external-api
    name: External Integrations
    description: External API boundary for source control, cloud providers, payments, and OAuth-based identity.
    provenance:
      locations:
        - input: primary
          path: routes/webhooks.php
        - input: primary
          path: app/Http/Controllers/Webhook/Github.php
        - input: primary
          path: app/Http/Controllers/Api/HetznerController.php
        - input: primary
          path: app/Http/Controllers/OauthController.php
relations:
  - id: rel-portal-app-calls-control-plane
    from: portal-app/web-routes/route-definitions/authenticated-browser-routes
