    type: gallery/supabase.types.control-plane
    name: Studio control plane
    description: >-
      Studio API surfaces and support clusters that bridge operator actions to self-hosted services,
      pg-meta, AI tooling, and outbound integrations.
    provenance:
      locations:
        - input: primary
          path: apps/studio/package.json
        - input: primary
          path: apps/studio/pages/api/mcp/index.ts
        - input: primary
          path: apps/studio/pages/api/platform/pg-meta/[ref]/tables.ts
        - input: primary
          path: apps/studio/lib/api/self-hosted/query.ts
        - input: primary
          path: apps/studio/pages/api/platform/integrations/github/repositories.ts
    children:
      - id: studio-control-plane/mcp-api
        type: core/web-app.types.api
        name: MCP API
        description: Server-side MCP entrypoint for Studio operations.
        provenance:
          locations:
            - input: primary
              path: apps/studio/pages/api/mcp/index.ts
            - input: primary
              path: apps/studio/lib/api/self-hosted/mcp.ts
            - input: primary
              path: apps/studio/lib/api/self-hosted/query.ts
            - input: primary
              path: apps/studio/lib/api/self-hosted/logs.ts
