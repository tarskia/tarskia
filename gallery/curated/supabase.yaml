version: "0.1"
schemaRefs:
  - schema: gallery/supabase@0.1
    layer: 0
  - schema: core/frontend@0.3
    layer: 1
  - schema: core/code@0.1
    layer: 1
  - schema: core/web-app@0.3
    layer: 1
  - schema: core/frontend@0.3
    layer: 0
