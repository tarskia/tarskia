              path: apps/studio/lib/api/self-hosted/settings.ts
            - input: primary
              path: apps/studio/lib/api/self-hosted/functions/index.ts
      - id: studio-control-plane/platform-pg-meta-api
        type: core/code.types.module
        name: Platform pg-meta API
        description: Studio proxy for pg-meta table access.
        props:
          language: typescript
          runtime: server
        provenance:
          locations:
            - input: primary
              path: apps/studio/pages/api/platform/pg-meta/[ref]/tables.ts
      - id: studio-control-plane/platform-integrations-surface
        type: core/web-app.types.group
        name: Platform integrations surface
        description: >-
          Studio API surface for GitHub and Stripe integrations backed by shared GitHub client
