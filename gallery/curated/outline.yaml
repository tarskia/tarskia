                  - id: >-
                      websocket-event-plane/socket-runtime/authenticated-room-access/room-membership-session/collection-room
                    type: core/web-app.types.topic
                    name: Collection Room
                    description: Collection membership channel.
                    provenance:
                      locations:
                        - input: primary
