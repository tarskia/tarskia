version: 0.1.0
schemaRefs:
  - schema: gallery/outline@0.1
    layer: 0
  - schema: core/frontend@0.3
    layer: 0
  - schema: core/web-app@0.3
    layer: 1
  - schema: core/software@0.1
    layer: 1
  - schema: core/code@0.1
    layer: 2
  - schema: core/web-app@0.3
    layer: 0
  - schema: core/software@0.1
    layer: 0
  - schema: core/code@0.1
    layer: 1
entities:
  - id: browser-product-app
    type: gallery/outline.types.client-app
    name: Browser Product App
    description: Browser app runtime split into the bootstrap boundary and route surface.
    props:
      framework: react
      runtime: browser
    provenance:
      locations:
        - input: primary
          path: app/index.tsx
        - input: primary
          path: app/routes/index.tsx
    children:
      - id: browser-product-app/app-bootstrap
        type: core/web-app.types.group
        name: App Bootstrap
        description: Browser bootstrap shell and service worker setup.
        props:
          mode: mixed
        provenance:
          locations:
            - input: primary
              path: app/index.tsx
        children:
          - id: browser-product-app/app-bootstrap/app-shell
            type: core/frontend.types.frontend
            name: App Shell
            description: Browser bootstrap shell.
            props:
              framework: react
              runtime: browser
            provenance:
              locations:
                - input: primary
                  path: app/index.tsx
                - input: primary
                  path: app/index.tsx
          - id: browser-product-app/app-bootstrap/service-worker
            type: core/code.types.module
            name: Service Worker
            description: Worker registration.
            provenance:
              locations:
                - input: primary
                  path: app/index.tsx
      - id: browser-product-app/route-tree
        type: core/web-app.types.group
        name: Route Tree
        description: Browser route split between public documents and authenticated app surfaces.
        props:
          mode: mixed
        provenance:
          locations:
            - input: primary
              path: app/routes/index.tsx
        children:
          - id: browser-product-app/route-tree/shared-document-routes
            type: core/web-app.types.group
            name: Shared Document Routes
            description: Shared-document routing branches for public document access.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: app/routes/index.tsx
            children:
              - id: browser-product-app/route-tree/shared-document-routes/root-share-routes
                type: core/code.types.module
                name: Root Share Routes
                description: Root-share document entry routes.
                provenance:
                  locations:
                    - input: primary
                      path: app/routes/index.tsx
              - id: >-
                  browser-product-app/route-tree/shared-document-routes/shared-document-routes-branch
                type: core/code.types.module
                name: Shared Document Routes Branch
                description: Shared-document routes and redirects.
                provenance:
                  locations:
                    - input: primary
                      path: app/routes/index.tsx
          - id: browser-product-app/route-tree/authenticated-routes
            type: core/web-app.types.group
            name: Authenticated Routes
            description: Authenticated route branch for auth entry points and the main app surface.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: app/routes/index.tsx
            children:
              - id: browser-product-app/route-tree/authenticated-routes/auth-session-routes
                type: core/code.types.module
                name: Auth Session Routes
                description: Login, logout, desktop, and OAuth routes.
                provenance:
                  locations:
                    - input: primary
                      path: app/routes/index.tsx
              - id: browser-product-app/route-tree/authenticated-routes/authenticated-app-routes
                type: core/frontend.types.frontend
                name: Authenticated App Routes
                description: Authenticated browser app surface.
                provenance:
                  locations:
                    - input: primary
                      path: app/routes/index.tsx
              - id: browser-product-app/route-tree/authenticated-routes/authenticated-app-shell
                type: core/web-app.types.application
                name: Authenticated App Shell
                description: Rendered authenticated application boundary.
                provenance:
                  locations:
                    - input: primary
                      path: app/routes/index.tsx
  - id: koa-web-host
    type: gallery/outline.types.web-service
    name: Koa Web Host
    description: Koa host split between process startup and mounted HTTP surface.
    props:
      deployability: deployable
      framework: koa
      runtime: server
    provenance:
      locations:
        - input: primary
          path: server/index.ts
        - input: primary
          path: server/services/index.ts
        - input: primary
          path: server/services/web.ts
        - input: primary
          path: server/routes/index.ts
        - input: primary
          path: server/routes/api/index.ts
        - input: primary
          path: server/routes/auth/index.ts
        - input: primary
          path: server/routes/mcp/index.ts
    children:
      - id: koa-web-host/service-startup
        type: core/code.types.module
        name: Service Startup
        description: Process bootstrap and service registry.
        props:
          language: typescript
          runtime: server
          framework: koa
        provenance:
          locations:
            - input: primary
              path: server/index.ts
            - input: primary
              path: server/services/index.ts
      - id: koa-web-host/http-surface
        type: core/web-app.types.group
        name: HTTP Surface
        description: Browser, API, auth, OAuth, and MCP surfaces mounted into the Koa host.
        props:
          mode: mixed
        provenance:
          locations:
            - input: primary
              path: server/services/web.ts
            - input: primary
              path: server/routes/index.ts
            - input: primary
              path: server/routes/api/index.ts
            - input: primary
              path: server/routes/auth/index.ts
            - input: primary
              path: server/routes/mcp/index.ts
        children:
          - id: koa-web-host/http-surface/browser-surface
            type: core/frontend.types.frontend
            name: Browser Surface
            description: Public browser-rendered surface.
            provenance:
              locations:
                - input: primary
                  path: server/routes/index.ts
                - input: primary
                  path: server/services/web.ts
          - id: koa-web-host/http-surface/api-surface
            type: core/web-app.types.api
            name: API Surface
            description: Main JSON API boundary.
            provenance:
              locations:
                - input: primary
                  path: server/routes/api/index.ts
                - input: primary
                  path: server/services/web.ts
          - id: koa-web-host/http-surface/auth-surface
            type: core/web-app.types.api-endpoint
            name: Auth Surface
            description: Browser authentication redirect flow.
            provenance:
              locations:
                - input: primary
                  path: server/routes/auth/index.ts
                - input: primary
                  path: server/services/web.ts
          - id: koa-web-host/http-surface/mcp-surface
            type: core/web-app.types.api-endpoint
            name: MCP Surface
            description: Scoped MCP protocol endpoint.
            provenance:
              locations:
                - input: primary
                  path: server/routes/mcp/index.ts
                - input: primary
                  path: server/services/web.ts
          - id: koa-web-host/http-surface/oauth-surface
            type: core/web-app.types.api-endpoint
            name: OAuth Surface
            description: OAuth discovery and protocol endpoints.
            provenance:
              locations:
                - input: primary
                  path: server/routes/index.ts
                - input: primary
                  path: server/services/web.ts
  - id: collaboration-service
    type: gallery/outline.types.collaboration-service
    name: Realtime Collaboration Service
    description: Realtime collaboration plane split into runtime and persistence hook.
    props:
