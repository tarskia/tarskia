      runtime: server
    provenance:
      locations:
        - input: primary
          path: server/services/collaboration.ts
        - input: primary
          path: server/collaboration/AuthenticationExtension.ts
        - input: primary
          path: server/collaboration/PersistenceExtension.ts
    children:
      - id: collaboration-service/collaboration-runtime
        type: core/web-app.types.group
        name: Collaboration Runtime
        description: WebSocket collaboration runtime and its authentication extension wiring.
        props:
          mode: mixed
        provenance:
          locations:
            - input: primary
              path: server/services/collaboration.ts
            - input: primary
              path: server/collaboration/AuthenticationExtension.ts
        children:
          - id: collaboration-service/collaboration-runtime/hocuspocus-runtime
            type: core/web-app.types.group
            name: Hocuspocus Runtime
            description: Hocuspocus WebSocket runtime for collaboration connections and extension wiring.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: server/services/collaboration.ts
            children:
              - id: >-
                  collaboration-service/collaboration-runtime/hocuspocus-runtime/collaboration-websocket-upgrade
                type: core/web-app.types.api-endpoint
                name: Collaboration WebSocket Upgrade
                description: Handles the /collaboration upgrade entrypoint.
                provenance:
                  locations:
                    - input: primary
                      path: server/services/collaboration.ts
              - id: >-
                  collaboration-service/collaboration-runtime/hocuspocus-runtime/hocuspocus-extension-stack
                type: core/web-app.types.group
                name: Hocuspocus Extension Stack
                description: Hocuspocus collaboration extensions for authentication and persistence.
                props:
                  mode: mixed
                provenance:
                  locations:
                    - input: primary
                      path: server/services/collaboration.ts
                children:
                  - id: >-
                      collaboration-service/collaboration-runtime/hocuspocus-runtime/hocuspocus-extension-stack/authentication-extension
                    type: core/code.types.module
                    name: Authentication Extension
                    description: Resolves the collaboration user context.
                    provenance:
                      locations:
                        - input: primary
                          path: server/services/collaboration.ts
                        - input: primary
                          path: server/collaboration/AuthenticationExtension.ts
                  - id: >-
                      collaboration-service/collaboration-runtime/hocuspocus-runtime/hocuspocus-extension-stack/persistence-extension
                    type: core/code.types.module
                    name: Persistence Extension
                    description: Stores collaboration document updates.
                    provenance:
                      locations:
                        - input: primary
                          path: server/services/collaboration.ts
                        - input: primary
                          path: server/collaboration/PersistenceExtension.ts
          - id: collaboration-service/collaboration-runtime/authentication-extension
            type: core/code.types.module
            name: Authentication Extension
            description: Collaboration auth hook.
            provenance:
              locations:
                - input: primary
                  path: server/collaboration/AuthenticationExtension.ts
      - id: collaboration-service/persistence-extension
        type: core/code.types.module
        name: Persistence Extension
        description: Document persistence hook.
        props:
          language: typescript
          runtime: server
        provenance:
          locations:
            - input: primary
              path: server/collaboration/PersistenceExtension.ts
  - id: websocket-event-plane
