              - id: >-
                  websocket-event-plane/socket-runtime/realtime-socket-server/websocket-queue-processing
                type: core/code.types.module
                name: Websocket Queue Processing
                description: Starts websocket queue processing and delivery wiring.
                provenance:
                  locations:
                    - input: primary
                      path: server/services/websockets.ts
                    - input: primary
                      path: server/queues/index.ts
          - id: websocket-event-plane/socket-runtime/authenticated-room-access
            type: core/web-app.types.group
            name: Authenticated Room Access
            description: >-
              Socket authentication and room membership lifecycle for authenticated websocket
              sessions.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: server/services/websockets.ts
            children:
              - id: >-
                  websocket-event-plane/socket-runtime/authenticated-room-access/socket-authentication
                type: core/code.types.module
                name: Socket Authentication
                description: Validates the access token and attaches the user.
                provenance:
                  locations:
                    - input: primary
                      path: server/services/websockets.ts
              - id: >-
                  websocket-event-plane/socket-runtime/authenticated-room-access/room-membership-session
                type: core/web-app.types.group
                name: Room Membership Session
                description: Authenticated socket room membership session.
                props:
                  mode: mixed
                provenance:
                  locations:
                    - input: primary
                      path: server/services/websockets.ts
                children:
                  - id: >-
                      websocket-event-plane/socket-runtime/authenticated-room-access/room-membership-session/room-membership-controller
                    type: core/code.types.module
                    name: Room Membership Controller
                    description: Manages authenticated room joins and leaves.
