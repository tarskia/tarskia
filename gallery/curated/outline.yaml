        - input: primary
          path: server/queues/index.ts
    children:
      - id: websocket-event-plane/socket-runtime
        type: core/code.types.module
        name: Socket Runtime
        description: Realtime Socket.IO runtime and authenticated room membership handling.
        props:
          framework: socketio
          runtime: server
          language: typescript
        provenance:
          locations:
            - input: primary
              path: server/services/websockets.ts
            - input: primary
              path: server/queues/index.ts
        children:
          - id: websocket-event-plane/socket-runtime/realtime-socket-server
            type: core/web-app.types.group
            name: Realtime Socket Server
            description: >-
              Realtime Socket.IO runtime for collaboration fanout, room access, and queue
              processing.
            props:
              mode: mixed
            provenance:
              locations:
                - input: primary
                  path: server/services/websockets.ts
                - input: primary
                  path: server/queues/index.ts
            children:
              - id: websocket-event-plane/socket-runtime/realtime-socket-server/realtime-socket-entry
