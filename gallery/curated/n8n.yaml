relations:
  - id: rel-browser-editor-app-calls-main-control-plane
    from: browser-editor-app/workflows-view
    to: main-control-plane/server-runtime/server-bootstrap/controller-imports
    type: core/software.relations.calls
    description: Browser editor drives the main API and orchestration server.
    provenance:
      locations:
        - input: primary
          path: packages/frontend/editor-ui/src/main.ts
        - input: primary
          path: packages/cli/src/server.ts
  - id: rel-main-control-plane-publishes-workflow-queue
    from: main-control-plane/server-runtime/queue-publisher
    to: workflow-queue/jobs
    type: core/software.relations.publishes-to
    description: Server publishes workflow jobs into the queue.
    provenance:
      locations:
        - input: primary
          path: packages/cli/src/server.ts
        - input: primary
          path: packages/cli/src/scaling/scaling.service.ts
  - id: rel-queue-worker-plane-consumes-workflow-queue
    from: queue-worker-plane/scaling-service/queue-orchestration/queue-wiring
    to: workflow-queue/jobs
    type: core/software.relations.consumes-from
    description: Worker consumes workflow jobs from the queue.
    provenance:
      locations:
        - input: primary
          path: packages/cli/src/commands/worker.ts
        - input: primary
          path: packages/cli/src/scaling/pubsub/subscriber.service.ts
  - id: rel-queue-worker-plane-calls-task-runner-runtime
    from: queue-worker-plane/job-processor/task-runner-client
    to: task-runner-runtime/task-runner-entrypoint/task-runner-handoff
    type: core/software.relations.calls
    description: Worker delegates task execution to the task runner.
    provenance:
      locations:
        - input: primary
          path: packages/cli/src/commands/worker.ts
        - input: primary
          path: packages/@n8n/task-runner/src/start.ts
  - id: rel-task-runner-runtime-consumes-from-task-broker
    from: task-runner-runtime/task-runner-core/broker-transport
    to: task-broker
    type: core/software.relations.consumes-from
    description: Task runner receives work through the broker.
    provenance:
      locations:
        - input: primary
          path: packages/@n8n/task-runner/src/task-runner.ts
        - input: primary
          path: packages/cli/src/task-runners/task-broker/task-broker-server.ts
        - input: primary
          path: packages/cli/src/task-runners/task-broker/task-broker.service.ts
