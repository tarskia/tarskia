name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @biomejs/cli-linux-x64@2.4.10

      - name: Build semantic assets
        run: npm run build:semantics

      - name: Lint
        run: npm run lint -w @tarskia/frontend

      - name: Run frontend tests
        run: npm run test -w @tarskia/frontend

      - name: Run semantic package tests
        run: npm run test -w @tarskia/diagram-semantics

      - name: Build frontend
        run: npm run build -w @tarskia/frontend
